server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kpl_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456   # 修改为你的MySQL密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update        # 首次运行自动建表，后续改为 validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# JWT 配置
jwt:
  secret: kpl-esports-center-secret-key-2026-spring-boot-jwt-very-long-key  # 至少64字符
  expiration: 86400000      # 24小时（毫秒）
  refresh-expiration: 604800000  # 7天

# 跨域配置
cors:
  allowed-origins: http://localhost:8081,http://localhost:5173,http://127.0.0.1:8081

logging:
  level:
    com.kpl: DEBUG
    org.springframework.security: INFO

kpl:
  sync:
    api-url: https://kplshop-op.timi-esports.qq.com/kplow/getScheduleList
    mock-fallback: false
    season-ids: []
    seasonid-overrides: ""
  player-sync:
    team-apis: {}
  team-sync:
    api-url: https://kplshop-op.timi-esports.qq.com/kplow/getTeamsIntro
    origin: https://kpl.qq.com
    referer: https://kpl.qq.com/
  ai:
    deepseek:
      base-url: https://api.deepseek.com/v1
      api-key: ${DEEPSEEK_API_KEY:sk-a5c31dc9b9074cb6bf6cf23442e24edb}
      model: deepseek-chat
      timeout-seconds: 60
      temperature: 0.25
      top-p: 0.8
      max-tokens: 1024
    hunyuan:
      api-base: https://hunyuan.cloud.tencent.com
      path: /hyllm/v1/chat/completions
      app-id: ${HUNYUAN_APP_ID:0}
      secret-id: ${HUNYUAN_SECRET_ID:}
      secret-key: ${HUNYUAN_SECRET_KEY:}
      timeout-seconds: 60
      temperature: 0.7
      top-p: 1.0
